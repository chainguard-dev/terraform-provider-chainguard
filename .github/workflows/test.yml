# Terraform Provider testing workflow.
name: Acceptance Tests

on:
  push:
    branches:
      - "main"
      - "releases/**"
    paths-ignore:
      - "README.md"
  pull_request_target:
    branches:
      - "main"
    paths-ignore:
      - "README.md"

permissions: {}

jobs:
  # Run acceptance tests in a matrix with Terraform CLI versions
  test:
    name: Terraform Provider Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # The acceptance-tests environment requires reviewer approval before
    # the job runs. This prevents untrusted fork PRs from accessing OIDC
    # credentials without maintainer review.
    #
    # We use pull_request_target (not pull_request) because fork PRs
    # cannot receive id-token:write with pull_request events, even with
    # environment approval. pull_request_target runs in the base repo
    # context where OIDC tokens are available.
    #
    # The ref override in the checkout step ensures we test the PR code,
    # not the base branch.
    #
    # Push events (main/releases) run without environment approval since
    # the code is already merged.
    environment: ${{ github.event_name == 'pull_request_target' && 'acceptance-tests' || '' }}

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        # list whatever Terraform versions here you would like to support
        terraform:
          - "1.13.*"
          - "1.14.*"
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            checkpoint-api.hashicorp.com:443
            console-api.enforce.dev:443
            dl.enforce.dev:443
            dl.google.com:443
            github.com:443
            go.dev:443
            issuer.enforce.dev:443
            justtrustme.dev:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            release-assets.githubusercontent.com:443
            releases.hashicorp.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # For pull_request_target, checkout the PR code, not the base branch.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: "go.mod"
          check-latest: true
          cache: true

      - uses: chainguard-dev/setup-chainctl@2cddd35a2f120d9973e58094dc6878c93cf58c28 # v0.5.1
        with:
          identity: "ef127a7c0909329f04b43d845cf80eea4247a07b/66305475446bbef6/51be6000f74f6cb7/72b16b9edc62a069"

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false

      - run: go mod download

      - name: Build provider
        run: go build -o terraform-provider-chainguard

      - name: Setup Terraform dev overrides
        run: |
          cat > ~/.terraformrc << EOF
          provider_installation {
            dev_overrides {
              "chainguard-dev/chainguard" = "${{ github.workspace }}"
            }
            direct {}
          }
          EOF

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          TF_ACC_GROUP_ID: "ef127a7c0909329f04b43d845cf80eea4247a07b/66305475446bbef6/51be6000f74f6cb7"
          TF_CHAINGUARD_IDENTITY: "ef127a7c0909329f04b43d845cf80eea4247a07b/66305475446bbef6/51be6000f74f6cb7/72b16b9edc62a069"
          TF_ACC_CONSOLE_API: "https://console-api.enforce.dev"
          TF_ACC_AUDIENCE: "https://console-api.enforce.dev"
          TF_ACC_ISSUER: "https://issuer.enforce.dev"
          TF_ACC_AMBIENT: "1"
        run: go test -v -cover -count=1 -race ./internal/...
        timeout-minutes: 10
